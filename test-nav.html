<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>测试：旋转弹鼓导航 v2</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  height: 100vh; overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
  background: linear-gradient(160deg,#2C1810 0%,#4A1A1A 30%,#6B2737 60%,#8B2642 100%);
}

/* ========== 切换按钮 ========== */
.toggle-btn {
  position: fixed; left: 0; top: 50%; transform: translateY(-50%);
  z-index: 1001; width: 44px; height: 44px; border: none;
  background: #C41E3A; color: #fff; font-size: 1.15rem; cursor: pointer;
  border-radius: 0 50% 50% 0;
  box-shadow: 3px 0 14px rgba(196,30,58,0.35);
  transition: all 0.3s;
  display: flex; align-items: center; justify-content: center;
  padding-left: 3px; line-height: 1;
}
.toggle-btn:hover { background: #8B0000; transform: translateY(-50%) scale(1.08); }
.toggle-btn.open .icon { transform: rotate(90deg); }
.icon { display: block; transition: transform 0.3s; }

/* ========== 圆形容器 ========== */
.nav-wrap {
  position: fixed; left: 0; top: 50%; transform: translateY(-50%);
  z-index: 999; width: 400px; height: 400px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.35s ease;
}
.nav-wrap.open {
  opacity: 1;
  pointer-events: auto;
}

/* 完整的圆，圆心在屏幕左边缘 */
.nav-circle {
  position: absolute; left: -200px; top: 0;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: rgba(255,248,240,0.96);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  box-shadow: 6px 0 40px rgba(44,24,16,0.2);
  border-right: 1px solid rgba(196,30,58,0.08);
  overflow: visible;
  transition: transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ========== 圆弧按钮排列 ========== */
.nav-btn {
  position: absolute; width: 46px; height: 46px;
  border: none; border-radius: 50%;
  background: transparent; color: #5C3A28;
  cursor: pointer; font-size: 1.15rem;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transform: scale(0.3) rotate(-45deg);
  transition: none;
}
.nav-btn .bg {
  position: absolute; inset: 0; border-radius: 50%;
  background: rgba(255,255,255,0.85);
  box-shadow: 0 2px 10px rgba(44,24,16,0.1);
  transition: all 0.25s;
}
.nav-btn .ico { position: relative; line-height: 1; }
.nav-btn .nav-label {
  position: absolute; left: calc(100% + 10px); top: 50%;
  transform: translateY(-50%); white-space: nowrap;
  font-size: 0.82rem; font-weight: 600; color: #5C3A28;
  background: rgba(255,255,255,0.95);
  padding: 5px 14px; border-radius: 6px;
  box-shadow: 0 2px 10px rgba(44,24,16,0.1);
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}

/* 按钮弧线位置 (圆心200,200, R=152) */
.nav-btn:nth-child(1) { left: 241px; top: 39px; }   /* -65° */
.nav-btn:nth-child(2) { left: 305px; top: 95px; }    /* -32.5° */
.nav-btn:nth-child(3) { left: 329px; top: 177px; }   /* 0° */
.nav-btn:nth-child(4) { left: 305px; top: 259px; }   /* 32.5° */
.nav-btn:nth-child(5) { left: 241px; top: 315px; }   /* 65° */

/* 打开时按钮依次弹出 */
.nav-wrap.open .nav-btn {
  opacity: 1;
  transform: scale(1) rotate(0deg);
  transition: all 0.40s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.nav-wrap.open .nav-btn:nth-child(1) { transition-delay: 0.06s; }
.nav-wrap.open .nav-btn:nth-child(2) { transition-delay: 0.12s; }
.nav-wrap.open .nav-btn:nth-child(3) { transition-delay: 0.18s; }
.nav-wrap.open .nav-btn:nth-child(4) { transition-delay: 0.24s; }
.nav-wrap.open .nav-btn:nth-child(5) { transition-delay: 0.30s; }
.nav-wrap:not(.open) .nav-btn { transition: opacity 0.15s, transform 0.2s; }

.nav-btn:hover .bg { background: rgba(196,30,58,0.12); transform: scale(1.15); }
.nav-btn.active .bg { background: #C41E3A; box-shadow: 0 4px 14px rgba(196,30,58,0.4); }
.nav-btn.active .ico { color: #fff; }
.nav-btn:hover .nav-label,
.nav-btn.active .nav-label { opacity: 1; }
.nav-btn.active .nav-label { color: #C41E3A; }

/* ========== 内容页 ========== */
.pages {
  position: fixed; inset: 0;
  touch-action: pan-y;
}
.page {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transition: opacity 0.5s ease;
  pointer-events: none;
}
.page.active {
  opacity: 1;
  pointer-events: auto;
}

.page-inner {
  text-align: center;
  color: rgba(255,255,255,0.85);
  padding: 40px;
}
.page-icon { font-size: 4rem; margin-bottom: 16px; }
.page-title { font-size: 2rem; font-weight: 700; margin-bottom: 8px; text-shadow: 0 2px 20px rgba(0,0,0,0.3); }
.page-desc { font-size: 1rem; color: rgba(255,255,255,0.5); }
.page-num {
  margin-top: 24px;
  font-size: 0.85rem;
  color: rgba(255,255,255,0.3);
}
.swipe-hint {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.3);
  font-size: 0.85rem;
  animation: bob 2s ease-in-out infinite;
}
@keyframes bob {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-8px); }
}
</style>
</head>
<body>

<button class="toggle-btn" id="toggleBtn">
  <span class="icon" id="icon">☰</span>
</button>

<div class="nav-wrap" id="navWrap">
  <div class="nav-circle" id="navCircle">
    <button class="nav-btn" data-page="0">
      <span class="bg"></span><span class="ico">🦊</span>
      <span class="nav-label">首页</span>
    </button>
    <button class="nav-btn" data-page="1">
      <span class="bg"></span><span class="ico">🎵</span>
      <span class="nav-label">音乐</span>
    </button>
    <button class="nav-btn" data-page="2">
      <span class="bg"></span><span class="ico">📦</span>
      <span class="nav-label">项目</span>
    </button>
    <button class="nav-btn" data-page="3">
      <span class="bg"></span><span class="ico">🖼️</span>
      <span class="nav-label">画廊</span>
    </button>
    <button class="nav-btn" data-page="4">
      <span class="bg"></span><span class="ico">📬</span>
      <span class="nav-label">联系</span>
    </button>
  </div>
</div>

<div class="pages" id="pages">
  <div class="page active" data-index="0">
    <div class="page-inner">
      <div class="page-icon">🦊</div>
      <div class="page-title">酒狐・Shukko</div>
      <div class="page-desc">云梦闲筑 · 服主 & MC 插件开发者</div>
      <div class="page-num">1 / 5</div>
    </div>
  </div>
  <div class="page" data-index="1">
    <div class="page-inner">
      <div class="page-icon">🎵</div>
      <div class="page-title">狐音小馆</div>
      <div class="page-desc">温一壶酒，听一首歌</div>
      <div class="page-num">2 / 5</div>
    </div>
  </div>
  <div class="page" data-index="2">
    <div class="page-inner">
      <div class="page-icon">📦</div>
      <div class="page-title">狐作项目</div>
      <div class="page-desc">MC Bedrock 插件 & 资源包</div>
      <div class="page-num">3 / 5</div>
    </div>
  </div>
  <div class="page" data-index="3">
    <div class="page-inner">
      <div class="page-icon">🖼️</div>
      <div class="page-title">狐影集</div>
      <div class="page-desc">光与影的碎片</div>
      <div class="page-num">4 / 5</div>
    </div>
  </div>
  <div class="page" data-index="4">
    <div class="page-inner">
      <div class="page-icon">📬</div>
      <div class="page-title">联系狐</div>
      <div class="page-desc">欢迎来找我玩～</div>
      <div class="page-num">5 / 5</div>
    </div>
  </div>
</div>

<div class="swipe-hint" id="swipeHint">⬆ 上滑 / ⬇ 下滑</div>

<script>
// ========== 配置 ==========
const BUTTON_ANGLES = [-65, -32.5, 0, 32.5, 65]; // 每个按钮的本地角度
const TOTAL = BUTTON_ANGLES.length;
let currentPage = 0;
let isOpen = false;
let isAnimating = false; // 防止连点

// ========== DOM ==========
const toggle = document.getElementById('toggleBtn');
const wrap = document.getElementById('navWrap');
const circle = document.getElementById('navCircle');
const icon = document.getElementById('icon');
const pages = document.querySelectorAll('.page');
const navBtns = document.querySelectorAll('.nav-btn');
const pagesEl = document.getElementById('pages');
const swipeHint = document.getElementById('swipeHint');

// ========== 核心函数 ==========
function getRotationForPage(index) {
  return -BUTTON_ANGLES[index];
}

function switchToPage(newIndex) {
  if (isAnimating) return;
  if (newIndex < 0) newIndex = TOTAL - 1;   // 循环
  if (newIndex >= TOTAL) newIndex = 0;       // 循环
  if (newIndex === currentPage) return;

  isAnimating = true;
  
  const prevPage = currentPage;
  currentPage = newIndex;

  // 旋转圆 — 左轮上膛
  circle.style.transform = `rotate(${getRotationForPage(currentPage)}deg)`;

  // 切换页面
  pages[prevPage].classList.remove('active');
  pages[newIndex].classList.add('active');

  // 更新按钮高亮
  navBtns.forEach((btn, i) => {
    btn.classList.toggle('active', i === currentPage);
  });

  // 更新页码指示
  pages[newIndex].querySelector('.page-num').textContent = `${newIndex + 1} / ${TOTAL}`;

  // 动画锁
  setTimeout(() => { isAnimating = false; }, 600);
}

function toggleNav() {
  isOpen = !isOpen;
  wrap.classList.toggle('open', isOpen);
  toggle.classList.toggle('open', isOpen);
  icon.textContent = isOpen ? '✕' : '☰';
  
  if (isOpen) {
    // 打开时切换到当前页的正确旋转位置
    circle.style.transform = `rotate(${getRotationForPage(currentPage)}deg)`;
  }
}

// ========== 初始状态 ==========
// 标记首页为活跃
navBtns[0].classList.add('active');
// 圆初始在关闭状态

// ========== 触摸滑动 ==========
let touchStartY = 0;
let touchStartTime = 0;

pagesEl.addEventListener('touchstart', (e) => {
  touchStartY = e.touches[0].clientY;
  touchStartTime = Date.now();
}, { passive: true });

pagesEl.addEventListener('touchend', (e) => {
  const deltaY = touchStartY - e.changedTouches[0].clientY;
  const elapsed = Date.now() - touchStartTime;
  const velocity = Math.abs(deltaY) / Math.max(elapsed, 1);
  
  // 阈值：距离 > 40px 或 快速滑动
  if (Math.abs(deltaY) > 40 || (velocity > 0.5 && Math.abs(deltaY) > 15)) {
    if (deltaY > 0) switchToPage(currentPage + 1); // 上滑 → 下一页
    else switchToPage(currentPage - 1);              // 下滑 → 上一页
  }
}, { passive: true });

// ========== 鼠标滚轮 ==========
let wheelTimeout = null;
pagesEl.addEventListener('wheel', (e) => {
  e.preventDefault();
  if (wheelTimeout) return;
  wheelTimeout = setTimeout(() => { wheelTimeout = null; }, 600);
  
  if (e.deltaY > 0) switchToPage(currentPage + 1);
  else switchToPage(currentPage - 1);
}, { passive: false });

// ========== 键盘 ==========
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp') switchToPage(currentPage - 1);
  else if (e.key === 'ArrowDown') switchToPage(currentPage + 1);
});

// ========== 导航按钮点击 ==========
navBtns.forEach((btn, i) => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!isOpen) toggleNav();
    switchToPage(i);
  });
});

// ========== 切换按钮 ==========
toggle.addEventListener('click', (e) => {
  e.stopPropagation();
  toggleNav();
});

// 点击外部关闭导航
document.addEventListener('click', (e) => {
  if (isOpen && !wrap.contains(e.target) && e.target !== toggle) {
    toggleNav();
  }
});
</script>
</body>
</html>
