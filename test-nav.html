<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>测试：旋转弹鼓导航</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  height: 100vh; overflow: hidden;
  background: linear-gradient(160deg,#2C1810 0%,#4A1A1A 30%,#6B2737 60%,#8B2642 100%);
  font-family: system-ui, -apple-system, sans-serif;
}

/* ========== 切换按钮 ========== */
.toggle-btn {
  position: fixed;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  z-index: 1001;
  width: 44px; height: 44px;
  border: none;
  background: #C41E3A;
  color: #fff;
  font-size: 1.15rem;
  cursor: pointer;
  border-radius: 0 50% 50% 0;
  box-shadow: 3px 0 14px rgba(196,30,58,0.35);
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  padding-left: 3px;
  line-height: 1;
}
.toggle-btn:hover { background: #8B0000; transform: translateY(-50%) scale(1.08); }
.toggle-btn.open .icon { transform: rotate(90deg); }
.icon { display: block; transition: transform 0.3s; }

/* ========== 圆形容器 ========== */
.nav-wrap {
  position: fixed;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  z-index: 999;
  width: 400px;
  height: 400px;
  pointer-events: none;
}

/* 完整的圆，圆心在屏幕左边缘 (left: 0, 容器中心) */
.nav-circle {
  position: absolute;
  left: -200px;  /* 圆心=0 */
  top: 0;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: rgba(255,248,240,0.96);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 6px 0 40px rgba(44,24,16,0.2);
  /* 默认旋转：按钮在左侧被裁切 */
  transform: rotate(-110deg);
  transition: transform 0.65s cubic-bezier(0.34, 1.56, 0.64, 1);
  border-right: 1px solid rgba(196,30,58,0.08);
  overflow: visible;
}

.nav-wrap.open .nav-circle {
  transform: rotate(0deg);
}

/* ========== 圆弧按钮排列 ========== */
/* 圆心 (200,200), 弧半径 152px, 角度 -65° ~ +65° (间隔 32.5°) */
/* 按钮 46×46，减半(23px)修正位置 */
.nav-btn {
  position: absolute;
  width: 46px;
  height: 46px;
  border: none;
  border-radius: 50%;
  background: transparent;
  color: #5C3A28;
  cursor: pointer;
  font-size: 1.15rem;
  display: flex;
  align-items: center;
  justify-content: center;
  /* 初始隐藏 */
  opacity: 0;
  transform: scale(0.3) rotate(-45deg);
  transition: none;
}

.nav-btn .bg {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: rgba(255,255,255,0.85);
  box-shadow: 0 2px 10px rgba(44,24,16,0.1);
  transition: all 0.25s;
}
.nav-btn .ico {
  position: relative;
  line-height: 1;
}

/* 精确弧线位置 (圆心200,200 + R=152 + 偏移23) */
.nav-btn:nth-child(1) { left: 242px; top: 37px; }   /* -65° */
.nav-btn:nth-child(2) { left: 305px; top: 93px; }   /* -32.5° */
.nav-btn:nth-child(3) { left: 329px; top: 177px; }  /* 0° */
.nav-btn:nth-child(4) { left: 305px; top: 261px; }  /* 32.5° */
.nav-btn:nth-child(5) { left: 242px; top: 317px; }  /* 65° */

/* 展开动画 */
.nav-wrap.open .nav-btn {
  opacity: 1;
  transform: scale(1) rotate(0deg);
  transition: all 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.nav-wrap.open .nav-btn:nth-child(1) { transition-delay: 0.08s; }
.nav-wrap.open .nav-btn:nth-child(2) { transition-delay: 0.14s; }
.nav-wrap.open .nav-btn:nth-child(3) { transition-delay: 0.20s; }
.nav-wrap.open .nav-btn:nth-child(4) { transition-delay: 0.26s; }
.nav-wrap.open .nav-btn:nth-child(5) { transition-delay: 0.32s; }

/* 收起 */
.nav-wrap:not(.open) .nav-btn {
  transition: opacity 0.2s, transform 0.25s;
}
.nav-wrap:not(.open) .nav-btn:nth-child(1) { transition-delay: 0.30s; }
.nav-wrap:not(.open) .nav-btn:nth-child(2) { transition-delay: 0.24s; }
.nav-wrap:not(.open) .nav-btn:nth-child(3) { transition-delay: 0.18s; }
.nav-wrap:not(.open) .nav-btn:nth-child(4) { transition-delay: 0.12s; }
.nav-wrap:not(.open) .nav-btn:nth-child(5) { transition-delay: 0.06s; }

.nav-btn:hover .bg { background: rgba(196,30,58,0.12); transform: scale(1.15); }
.nav-btn.active .bg { background: #C41E3A; box-shadow: 0 4px 14px rgba(196,30,58,0.4); }
.nav-btn.active .ico { color: #fff; }

/* 标签 */
.nav-label {
  position: absolute;
  left: calc(100% + 10px);
  top: 50%;
  transform: translateY(-50%);
  white-space: nowrap;
  font-size: 0.82rem;
  font-weight: 600;
  color: #5C3A28;
  background: rgba(255,255,255,0.95);
  padding: 5px 14px;
  border-radius: 6px;
  box-shadow: 0 2px 10px rgba(44,24,16,0.1);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.nav-btn:hover .nav-label,
.nav-btn.active .nav-label { opacity: 1; }
.nav-btn.active .nav-label { color: #C41E3A; }

/* ========== 内容 ========== */
.content {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  font-size: 2rem;
  color: rgba(255,255,255,0.7);
}
</style>
</head>
<body>

<button class="toggle-btn" id="toggleBtn">
  <span class="icon" id="icon">☰</span>
</button>

<div class="nav-wrap" id="navWrap">
  <div class="nav-circle">
    <button class="nav-btn active" data-page="home">
      <span class="bg"></span>
      <span class="ico">🦊</span>
      <span class="nav-label">首页</span>
    </button>
    <button class="nav-btn" data-page="music">
      <span class="bg"></span>
      <span class="ico">🎵</span>
      <span class="nav-label">音乐</span>
    </button>
    <button class="nav-btn" data-page="projects">
      <span class="bg"></span>
      <span class="ico">📦</span>
      <span class="nav-label">项目</span>
    </button>
    <button class="nav-btn" data-page="gallery">
      <span class="bg"></span>
      <span class="ico">🖼️</span>
      <span class="nav-label">画廊</span>
    </button>
    <button class="nav-btn" data-page="contact">
      <span class="bg"></span>
      <span class="ico">📬</span>
      <span class="nav-label">联系</span>
    </button>
  </div>
</div>

<div class="content">🦊 旋转弹鼓导航测试</div>

<script>
const toggle = document.getElementById('toggleBtn');
const wrap = document.getElementById('navWrap');
const icon = document.getElementById('icon');
let isOpen = false;

toggle.addEventListener('click', (e) => {
  e.stopPropagation();
  isOpen = !isOpen;
  wrap.classList.toggle('open', isOpen);
  toggle.classList.toggle('open', isOpen);
  icon.textContent = isOpen ? '✕' : '☰';
});

document.addEventListener('click', (e) => {
  if (isOpen && !wrap.contains(e.target) && e.target !== toggle) {
    isOpen = false;
    wrap.classList.remove('open');
    toggle.classList.remove('open');
    icon.textContent = '☰';
  }
});
</script>
</body>
</html>
